<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CAP.OS // SYNAPTIC_PULSE_IDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { 
            --bg: #030303; --panel: #0a0a0a; --border: #1a1a1a; 
            --glow: #00FF00; --text: #00FF00; --dim: #004400; 
            --accent: #7FFF00; --err: #FF3300; --warn: #FFD700;
            --blade-w: 280px; --hud-h: 80px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Consolas', 'Courier New', monospace; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- KERNEL PULSE HUD --- */
        #hud-ribbon {
            height: var(--hud-h); background: #000; border-bottom: 2px solid var(--dim);
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 20px; z-index: 1000; position: relative;
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.05);
        }
        .pulse-ring {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--dim);
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: all 0.5s ease;
        }
        .pulse-ring.active { border-color: var(--glow); box-shadow: 0 0 15px var(--glow); }
        .pulse-label { position: absolute; bottom: -18px; font-size: 8px; color: #444; letter-spacing: 1px; font-weight: bold; }
        .pulse-ring.active .pulse-label { color: var(--glow); }
        .pulse-val { font-size: 10px; font-weight: bold; }

        .pulse-core { 
            width: 10px; height: 10px; background: var(--dim); border-radius: 50%; 
            animation: pulse-anim 2s infinite ease-in-out;
        }
        .pulse-ring.active .pulse-core { background: var(--glow); }
        @keyframes pulse-anim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* --- LAYOUT WRAPPER --- */
        #workspace { flex-grow: 1; position: relative; overflow: hidden; display: flex; }

        /* --- SUPER-BLADE (LEFT) --- */
        #super-blade {
            width: var(--blade-w); background: var(--panel); border-right: 2px solid var(--border);
            position: absolute; left: calc(-1 * var(--blade-w)); top: 0; bottom: 0;
            z-index: 500; transition: left 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column;
        }
        #super-blade.active { left: 0; }
        .blade-toggle-left {
            position: absolute; right: -40px; top: 20px; width: 40px; height: 50px;
            background: var(--panel); border: 2px solid var(--border); border-left: none;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border-radius: 0 8px 8px 0; font-size: 20px; color: var(--dim);
        }
        #super-blade.active .blade-toggle-left { color: var(--glow); }

        /* --- TELEMETRY-BLADE (RIGHT) --- */
        #telemetry-blade {
            width: var(--blade-w); background: var(--panel); border-left: 2px solid var(--border);
            position: absolute; right: calc(-1 * var(--blade-w)); top: 0; bottom: 0;
            z-index: 500; transition: right 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column;
        }
        #telemetry-blade.active { right: 0; }
        .blade-toggle-right {
            position: absolute; left: -40px; top: 20px; width: 40px; height: 50px;
            background: var(--panel); border: 2px solid var(--border); border-right: none;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border-radius: 8px 0 0 8px; font-size: 20px; color: var(--dim);
        }
        #telemetry-blade.active .blade-toggle-right { color: var(--glow); }

        /* --- SYNAPTIC CANVAS --- */
        #canvas-wrap { flex-grow: 1; background: radial-gradient(circle, #050505 0%, #000 100%); position: relative; }
        #synaptic-canvas { width: 100%; height: 100%; cursor: grab; }
        #synaptic-canvas:active { cursor: grabbing; }

        /* --- HUD ELEMENTS --- */
        .hud-overlay { 
            position: absolute; padding: 10px; background: rgba(0,0,0,0.7); 
            border: 1px solid var(--dim); font-size: 10px; color: #666; pointer-events: none;
            backdrop-filter: blur(5px);
        }
        #hud-top-l { top: 10px; left: 10px; border-left: 3px solid var(--glow); }
        #hud-bot-r { bottom: 10px; right: 10px; text-align: right; border-right: 3px solid var(--accent); }
        
        /* --- COMPONENTS --- */
        .blade-header { padding: 15px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--glow); letter-spacing: 2px; text-transform: uppercase; display: flex; justify-content: space-between; }
        .blade-content { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .nav-item { padding: 10px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #111; }
        .nav-item:hover { background: #111; color: var(--glow); }
        
        .event { padding: 8px; border-bottom: 1px solid #111; font-size: 10px; }
        .event-type { font-weight: bold; color: #FFF; margin-bottom: 3px; }
        .event-meta { color: #555; }

        /* --- MODAL EDITOR (SYNAPTIC) --- */
        #node-modal {
            position: absolute; width: 350px; background: var(--panel); border: 2px solid var(--glow);
            box-shadow: 0 0 30px rgba(0,255,0,0.1); z-index: 1000; display: none;
            flex-direction: column; transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .modal-header { background: #000; padding: 8px 12px; font-size: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #editor { width: 100%; height: 250px; background: #000; color: var(--glow); font-family: inherit; border: none; padding: 15px; outline: none; resize: none; font-size: 12px; line-height: 1.5; }

        .btn-mini { padding: 2px 8px; background: var(--dim); color: var(--glow); border: 1px solid var(--glow); font-size: 9px; cursor: pointer; }
        .btn-mini:hover { background: var(--glow); color: #000; }

        /* --- CREDIT TICKER --- */
        #total-credits { color: var(--warn); font-weight: bold; }
    </style>
</head>
<body>
    <div id="hud-ribbon">
        <div class="pulse-ring active" id="pulse-clide">
            <div class="pulse-core"></div>
            <div class="pulse-val" id="val-clide">--%</div>
            <div class="pulse-label">CLIDE 🛡️</div>
        </div>
        <div class="pulse-ring active" id="pulse-apc">
            <div class="pulse-core"></div>
            <div class="pulse-val" id="val-apc">--%</div>
            <div class="pulse-label">APC 🔫</div>
        </div>
        <div class="pulse-ring active" id="pulse-pie">
            <div class="pulse-core"></div>
            <div class="pulse-val" id="val-pie">--%</div>
            <div class="pulse-label">PIE 🧠</div>
        </div>
        <div class="pulse-ring active" id="pulse-mem">
            <div class="pulse-core"></div>
            <div class="pulse-val" id="val-mem">--%</div>
            <div class="pulse-label">MEM 💾</div>
        </div>
        <div class="pulse-ring active" id="pulse-swarm">
            <div class="pulse-core"></div>
            <div class="pulse-val" id="val-swarm">0</div>
            <div class="pulse-label">SWARM 🤖</div>
        </div>
    </div>

    <div id="workspace">
        <div id="super-blade">
            <div class="blade-toggle-left" onclick="toggleBlade('super-blade')">📑</div>
            <div class="blade-header">📂 SUPER_EXPLORER</div>
            <div class="blade-content" id="file-list"></div>
            <div class="blade-header" style="border-top: 1px solid var(--border)">🛒 INTENT_MARKET</div>
            <div class="blade-content" id="intent-list" style="flex-grow:0; height: 150px;"></div>
        </div>

        <div id="canvas-wrap">
            <canvas id="synaptic-canvas"></canvas>
            <div id="hud-top-l" class="hud-overlay">
                <div>SYSTEM_STATE: <span style="color:var(--glow)">NOMINAL</span></div>
                <div>CREDITS: <span id="total-credits">0.00</span> 🪙</div>
            </div>
            <div id="hud-bot-r" class="hud-overlay">
                <div id="node-count">NODES: 0</div>
                <div id="active-trace-id">TRACE: IDLE</div>
            </div>

            <!-- THE NODE MODAL (Expandable Editor) -->
            <div id="node-modal">
                <div class="modal-header">
                    <span id="modal-title">NODE_INSPECTOR</span>
                    <span style="cursor:pointer" onclick="closeNodeModal()">×</span>
                </div>
                <div id="modal-body">
                    <textarea id="editor" spellcheck="false"></textarea>
                </div>
                <div style="padding: 10px; border-top: 1px solid var(--border); display: flex; justify-content: space-between;">
                    <button class="btn-mini" onclick="saveNodeContent()">SAVE_CHANGES</button>
                    <button class="btn-mini" id="btn-inspect-trace" style="display:none">DEEP_DIAGNOSIS</button>
                </div>
            </div>
        </div>

        <div id="telemetry-blade">
            <div class="blade-toggle-right" onclick="toggleBlade('telemetry-blade')">📜</div>
            <div class="blade-header">📡 COGNITIVE_FEED</div>
            <div class="blade-content" id="event-log"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('synaptic-canvas');
        const ctx = canvas.getContext('2d');
        const ws = new WebSocket(`ws://${location.host}/ws/live`);
        
        let nodes = [];
        let links = [];
        let offset = { x: 0, y: 0 };
        let zoom = 1.0;
        let isDragging = false;
        let lastMousePos = { x: 0, y: 0 };
        let selectedNode = null;
        let myAgentId = 'prime';

        // --- Core Setup ---
        function init() {
            resize();
            window.addEventListener('resize', resize);
            animate();
            loadInitialData();
        }

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }

        function toggleBlade(id) {
            document.getElementById(id).classList.toggle('active');
        }

        // --- Graph Logic ---
        function loadInitialData() {
            updateStats();
            loadFiles('.');
        }

        async function updateStats() {
            try {
                const [agents, intents, status, traces] = await Promise.all([
                    fetch('/api/swarm/agents').then(r => r.json()),
                    fetch('/api/intents').then(r => r.json()),
                    fetch('/api/status').then(r => r.json()),
                    fetch('/api/traces').then(r => r.json())
                ]);

                // Update HUD Pulse
                if(status.subsystems) {
                    document.getElementById('val-clide').innerText = Math.round(status.subsystems.CLIDE.metrics.success_rate * 100) + '%';
                    document.getElementById('val-apc').innerText = Math.round(status.subsystems.APC.metrics.success_rate * 100) + '%';
                    document.getElementById('val-pie').innerText = Math.round(status.subsystems.PIE.metrics.success_rate * 100) + '%';
                    document.getElementById('val-mem').innerText = Math.round(status.subsystems.MEMORY.metrics.success_rate * 100) + '%';
                }
                document.getElementById('val-swarm').innerText = agents.length;
                document.getElementById('total-credits').innerText = agents.reduce((acc, a) => acc + a.balance, 0).toFixed(2);
                document.getElementById('node-count').innerText = `NODES: ${nodes.length}`;

                // Sync Graph Nodes
                syncGraph(agents, traces);
                
                // Update Sidebar Market
                document.getElementById('intent-list').innerHTML = intents.map(i => `
                    <div class="nav-item" style="font-size:10px;">
                        <span>🛒 ${i.name}</span>
                        <span style="color:var(--warn)">${i.price.toFixed(1)}</span>
                    </div>
                `).join('');
            } catch(e) {}
        }

        function syncGraph(agents, traces) {
            // Add Agent Nodes
            agents.forEach(a => {
                if (!nodes.find(n => n.id === a.agent_id)) {
                    nodes.push({
                        id: a.agent_id,
                        type: 'AGENT',
                        label: `🤖 ${a.agent_id.slice(0,8)}`,
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        color: '#7FFF00',
                        vx: 0, vy: 0
                    });
                }
            });

            // Add Recent Trace Nodes
            traces.slice(0, 10).forEach(t => {
                if (!nodes.find(n => n.id === t.trace_id)) {
                    nodes.push({
                        id: t.trace_id,
                        type: 'TRACE',
                        label: `🚀 ${t.trace_id.slice(0,8)}`,
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        color: '#0088FF',
                        vx: 0, vy: 0
                    });
                }
            });
        }

        // --- Rendering ---
        function animate() {
            updatePhysics();
            draw();
            requestAnimationFrame(animate);
        }

        function updatePhysics() {
            const friction = 0.9;
            const repulsion = 500;
            const attraction = 0.01;

            nodes.forEach((n1, i) => {
                // Repulsion between all nodes
                nodes.forEach((n2, j) => {
                    if (i === j) return;
                    const dx = n1.x - n2.x;
                    const dy = n1.y - n2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    if (dist < 200) {
                        const force = repulsion / (dist * dist);
                        n1.vx += (dx / dist) * force;
                        n1.vy += (dy / dist) * force;
                    }
                });

                // Pull toward center
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                n1.vx += (cx - n1.x) * attraction;
                n1.vy += (cy - n1.y) * attraction;

                n1.x += n1.vx;
                n1.y += n1.vy;
                n1.vx *= friction;
                n1.vy *= friction;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(offset.x, offset.y);
            ctx.scale(zoom, zoom);

            // Draw Links (TBD)

            // Draw Nodes
            nodes.forEach(n => {
                ctx.beginPath();
                ctx.arc(n.x, n.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                ctx.strokeStyle = n.color;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = n.color;
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#FFF';
                ctx.font = '10px Consolas';
                ctx.textAlign = 'center';
                ctx.fillText(n.label, n.x, n.y + 25);
            });

            ctx.restore();
        }

        // --- Interaction ---
        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left - offset.x) / zoom;
            const my = (e.clientY - rect.top - offset.y) / zoom;
            
            selectedNode = nodes.find(n => {
                const dist = Math.sqrt((n.x - mx)**2 + (n.y - my)**2);
                return dist < 20;
            });

            if (selectedNode) {
                if (selectedNode.type === 'TRACE') {
                    inspectTrace(selectedNode.id);
                } else if (selectedNode.type === 'AGENT') {
                    openAgentDetails(selectedNode.id);
                }
            } else {
                isDragging = true;
                lastMousePos = { x: e.clientX, y: e.clientY };
            }
        };

        window.onmousemove = (e) => {
            if (isDragging) {
                offset.x += e.clientX - lastMousePos.x;
                offset.y += e.clientY - lastMousePos.y;
                lastMousePos = { x: e.clientX, y: e.clientY };
            }
        };

        window.onmouseup = () => { isDragging = false; };

        canvas.onwheel = (e) => {
            e.preventDefault();
            const scaleFactor = 1.1;
            if (e.deltaY < 0) zoom *= scaleFactor;
            else zoom /= scaleFactor;
        };

        // --- Modals & Blades ---
        async function loadFiles(path) {
            try {
                const res = await fetch(`/api/fs/ls?path=${path}`).then(r => r.json());
                const list = document.getElementById('file-list');
                list.innerHTML = '';
                
                // Sync Files to Graph
                res.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'nav-item';
                    div.innerHTML = `<span>${item.is_dir ? '📁' : '📄'}</span> ${item.name}`;
                    div.onclick = () => item.is_dir ? loadFiles(item.path) : openFileNode(item);
                    list.appendChild(div);

                    if (!item.is_dir && !nodes.find(n => n.id === item.path)) {
                        nodes.push({
                            id: item.path,
                            type: 'FILE',
                            label: `📄 ${item.name}`,
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            color: '#7FFF00',
                            vx: 0, vy: 0
                        });
                    }
                });
            } catch(e) {}
        }

        async function openFileNode(item) {
            const res = await fetch(`/api/fs/read?path=${item.path}`).then(r => r.json());
            const modal = document.getElementById('node-modal');
            const node = nodes.find(n => n.id === item.path);
            
            document.getElementById('modal-title').innerText = `📄 EDITING // ${item.name}`;
            document.getElementById('editor').value = res.content || '';
            document.getElementById('editor').dataset.path = item.path;
            
            // Position modal near node
            const screenX = node.x * zoom + offset.x;
            const screenY = node.y * zoom + offset.y;
            
            modal.style.display = 'flex';
            modal.style.left = `${Math.min(window.innerWidth - 380, Math.max(20, screenX))}px`;
            modal.style.top = `${Math.min(window.innerHeight - 350, Math.max(100, screenY))}px`;
        }

        function closeNodeModal() {
            document.getElementById('node-modal').style.display = 'none';
        }

        async function saveNodeContent() {
            const path = document.getElementById('editor').dataset.path;
            const content = document.getElementById('editor').value;
            const res = await fetch('/api/fs/write', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({path, content})
            }).then(r => r.json());
            if(res.status === 'success') closeNodeModal();
        }

        async function inspectTrace(traceId) {
            const modal = document.getElementById('node-modal');
            const node = nodes.find(n => n.id === traceId);
            
            document.getElementById('modal-title').innerText = `🚀 TRACE // ${traceId.slice(0,16)}`;
            document.getElementById('btn-inspect-trace').style.display = 'block';
            document.getElementById('btn-inspect-trace').onclick = () => window.location.hash = `trace=${traceId}`;
            
            const status = await fetch(`/api/trace_status/${traceId}`).then(r => r.json());
            document.getElementById('editor').value = status.logs || '[NO_LOGS_AVAILABLE]';
            
            const screenX = node.x * zoom + offset.x;
            const screenY = node.y * zoom + offset.y;
            modal.style.display = 'flex';
            modal.style.left = `${screenX}px`;
            modal.style.top = `${screenY}px`;
        }

        // --- Telemetry ---
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'EVENT') {
                const ev = msg.data;
                const div = document.createElement('div');
                div.className = 'event';
                div.innerHTML = `
                    <div class="event-type">${ev.event_type}</div>
                    <div class="event-meta">${new Date().toLocaleTimeString()} // ${ev.layer}</div>
                `;
                const log = document.getElementById('event-log');
                log.prepend(div);
                if(log.childNodes.length > 50) log.removeChild(log.lastChild);

                // Add Trace to Graph if new
                if (!nodes.find(n => n.id === ev.trace_id)) {
                    nodes.push({
                        id: ev.trace_id,
                        type: 'TRACE',
                        label: `🚀 ${ev.trace_id.slice(0,8)}`,
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        color: '#FF3300',
                        vx: 0, vy: 0
                    });
                }
            }
        };

        setInterval(updateStats, 5000);
        init();
    </script>
</body>
</html>
