<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATEGORY 1 // SUBCATEGORY_1</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-deep: #050505;
            --red-muted: #661414;
            --red-mid: #8a1a1a;
            --red-bright: #cc2424;
            --cyan-dim: #1a5c66;
            --border-muted: rgba(102, 20, 20, 0.4);
            --metal-shine: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 45%, #333 50%, #1a1a1a 55%, #111 100%);
            --trans-timing: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-deep); color: #999;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; 
        }

        .bg-lines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border-muted) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border-muted) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.04; z-index: 0;
        }

        #app-container {
            position: relative; width: 100vw; height: 100vh;
            z-index: 10;
        }

        #content-wrapper {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow-y: auto; background: #000; z-index: 1;
        }

        #content {
            padding: 60px 100px; max-width: 1200px; margin: 0 auto;
            background: radial-gradient(circle at top right, #0d0d0d, #050505);
            min-height: 100%;
        }

        #sidebar-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100; pointer-events: none;
            perspective: 2000px;
        }
        #sidebar-overlay.active { pointer-events: auto; }

        #sidebar-scroll-area {
            width: 380px; height: 100%; padding: 20px; box-sizing: border-box;
            overflow-y: auto; overflow-x: visible; pointer-events: auto;
            scrollbar-width: none;
        }
        #sidebar-scroll-area::-webkit-scrollbar { display: none; }

        .menu-chunk {
            background: var(--metal-shine); border: 1px solid #111;
            box-shadow: inset 1px 1px 0 rgba(255,255,255,0.05), inset -1px -1px 0 rgba(0,0,0,0.8), 15px 15px 40px rgba(0,0,0,0.9);
            margin-bottom: 15px; position: relative;
            transform-origin: left center; transform-style: preserve-3d;
            transition: transform var(--trans-timing), opacity 0.4s ease, filter 0.5s ease;
        }

        .menu-chunk::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/brushed-alum.png");
            opacity: 0.15; pointer-events: none; mix-blend-mode: overlay; z-index: -1;
        }

        .chunk-inner {
            margin: 6px; background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03); box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            padding: 15px; position: relative; z-index: 2;
        }

        .bolt {
            position: absolute; width: 6px; height: 6px; background: #222; border-radius: 50%;
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.1), 1px 1px 2px rgba(0,0,0,0.9); z-index: 5;
        }
        .t-l { top: 6px; left: 6px; } .t-r { top: 6px; right: 6px; }
        .b-l { bottom: 6px; left: 6px; } .b-r { bottom: 6px; right: 6px; }

        #sidebar-overlay:not(.active) .menu-chunk {
            opacity: 0; filter: blur(5px) brightness(0.2); pointer-events: none;
        }

        #sidebar-overlay:not(.active) .chunk-type-1 { transform: rotateY(-100deg) rotateX(40deg) translateZ(-600px) translateY(-200px) translateX(-100px); }
        #sidebar-overlay:not(.active) .chunk-type-2 { transform: rotateY(-120deg) rotateX(-20deg) translateZ(-800px) translateX(-300px); }
        #sidebar-overlay:not(.active) .chunk-type-3 { transform: rotateY(-80deg) rotateZ(30deg) translateZ(-400px) translateY(300px); }
        #sidebar-overlay:not(.active) .chunk-type-4 { transform: rotateX(80deg) rotateY(-50deg) translateZ(-700px) translateX(-200px); }

        .brand {
            font-size: 0.85em; font-weight: bold; color: #fff; text-align: center;
            letter-spacing: 5px; padding-bottom: 10px; margin-bottom: 5px;
            border-bottom: 1px solid var(--red-muted); text-transform: uppercase;
            text-shadow: 0 0 10px var(--red-muted);
        }

        .tier-1-header {
            color: var(--red-bright); font-size: 0.7em; text-transform: uppercase;
            letter-spacing: 3px; padding: 0 0 10px 0; font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px;
        }

        .tier-2-wrapper { margin-bottom: 6px; }
        .tier-2-header {
            color: #ccc; font-size: 0.65em; text-transform: uppercase; letter-spacing: 1.5px;
            padding: 10px 12px; background: rgba(0, 0, 0, 0.4); border-left: 2px solid var(--red-muted);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .tier-2-header::after { content: '⚙'; font-size: 1em; color: #555; transition: transform 0.4s; }
        .tier-2-wrapper.active .tier-2-header::after { transform: rotate(180deg); color: var(--red-bright); }

        .tier-3-container { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: rgba(0,0,0,0.6); opacity: 0; }
        .tier-2-wrapper.active .tier-3-container { max-height: 1000px; opacity: 1; }

        .doc-link {
            display: block; padding: 8px 15px; color: #666; text-decoration: none; cursor: pointer;
            font-size: 0.75em; border-bottom: 1px solid rgba(255,255,255,0.01);
        }
        .doc-link:hover { color: #aaa; background: rgba(255, 255, 255, 0.03); padding-left: 20px; }
        .doc-link.active { color: #fff; background: rgba(138, 26, 26, 0.3); border-right: 3px solid var(--red-bright); }

        #menu-trigger {
            position: fixed; top: 30px; left: 30px; z-index: 1000;
            background: #1a1a1a; border: 2px solid #333; color: #555; padding: 15px 25px; cursor: pointer;
            font-size: 0.6em; text-transform: uppercase; letter-spacing: 4px;
            transition: all 0.4s; opacity: 0; pointer-events: none;
            transform: translateX(-200px);
        }
        #menu-trigger.visible { opacity: 1; pointer-events: auto; transform: translateX(0); }

        #content h1 { color: #eee; border-bottom: 2px solid var(--red-muted); padding-bottom: 15px; }
        #content h2 { color: #8a1a1a; font-size: 1.5em; margin-top: 50px; }
        #content p, #content li { line-height: 1.8; color: #777; }
    </style>
</head>
<body>
    <div class="bg-lines"></div>
    <button id="menu-trigger" onclick="event.stopPropagation(); toggleMenu()" class="visible">[ PLACEHOLDER_1 ]</button>

    <div id="app-container">
        <div id="content-wrapper">
            <div id="content">
                <h1 style="text-align:center; margin-top: 25vh; border:none; color: #222; font-size: 4em; letter-spacing: 20px;">00</h1>
            </div>
        </div>

        <div id="sidebar-overlay" onclick="toggleMenu(false)">
            <div id="sidebar-scroll-area" onclick="event.stopPropagation()">
                <div class="menu-chunk chunk-type-1" style="transition-delay: 0.0s;">
                    <div class="bolt t-l"></div><div class="bolt t-r"></div>
                    <div class="bolt b-l"></div><div class="bolt b-r"></div>
                    <div class="chunk-inner"><div class="brand">BRAND 1 // BRAND 2</div></div>
                </div>
                <div id="menu-chunks"></div>
            </div>
        </div>
    </div>

    <script>
        const docsData = {
            "CATEGORY 1": {
                "SUBCATEGORY 1": {
                    "FILE 1": "# HEADER 1\n\n## HEADER 2\nBODY 1\n\n* LIST 1\n* LIST 2",
                    "FILE 2": "# HEADER 3\n\n## HEADER 4\nBODY 2"
                },
                "SUBCATEGORY 2": {
                    "FILE 3": "# HEADER 5\n\nBODY 3"
                }
            },
            "CATEGORY 2": {
                "SUBCATEGORY 3": {
                    "FILE 4": "# HEADER 6\n\nBODY 4"
                }
            }
        };

        let isSidebarActive = false;

        function toggleMenu(force) {
            const overlay = document.getElementById('sidebar-overlay');
            const btn = document.getElementById('menu-trigger');
            isSidebarActive = (force !== undefined) ? force : !isSidebarActive;
            if(isSidebarActive) {
                overlay.classList.add('active');
                btn.classList.remove('visible');
            } else {
                overlay.classList.remove('active');
                btn.classList.add('visible');
            }
        }

        function renderMenu() {
            const menuContainer = document.getElementById('menu-chunks');
            let chunkIndex = 1;
            for (const [catName, subcats] of Object.entries(docsData)) {
                const typeClass = 'chunk-type-' + ((chunkIndex % 4) + 1);
                const chunk = document.createElement('div');
                chunk.className = `menu-chunk ${typeClass}`;
                chunk.style.transitionDelay = (chunkIndex * 0.06) + "s";
                ['t-l', 't-r', 'b-l', 'b-r'].forEach(pos => {
                    const bolt = document.createElement('div'); bolt.className = `bolt ${pos}`; chunk.appendChild(bolt);
                });
                const inner = document.createElement('div'); inner.className = 'chunk-inner';
                const catHeader = document.createElement('div'); catHeader.className = 'tier-1-header'; catHeader.textContent = catName;
                inner.appendChild(catHeader);
                for (const [subcatName, files] of Object.entries(subcats)) {
                    const subcatWrapper = document.createElement('div'); subcatWrapper.className = 'tier-2-wrapper active';
                    const subcatHeader = document.createElement('div'); subcatHeader.className = 'tier-2-header'; subcatHeader.textContent = subcatName;
                    subcatHeader.onclick = () => subcatWrapper.classList.toggle('active');
                    subcatWrapper.appendChild(subcatHeader);
                    const linksContainer = document.createElement('div'); linksContainer.className = 'tier-3-container';
                    for (const [title, content] of Object.entries(files)) {
                        const link = document.createElement('a'); link.className = 'doc-link'; link.textContent = title;
                        link.onclick = (e) => {
                            e.preventDefault(); e.stopPropagation();
                            document.querySelectorAll('.doc-link').forEach(el => el.classList.remove('active'));
                            link.classList.add('active');
                            renderContent(content);
                            toggleMenu(false);
                        };
                        linksContainer.appendChild(link);
                    }
                    subcatWrapper.appendChild(linksContainer); inner.appendChild(subcatWrapper);
                }
                chunk.appendChild(inner); menuContainer.appendChild(chunk);
                chunkIndex++;
            }
        }

        function renderContent(markdownString) {
            const contentDiv = document.getElementById('content');
            contentDiv.style.opacity = 0;
            setTimeout(() => {
                contentDiv.innerHTML = marked.parse(markdownString);
                contentDiv.style.opacity = 1;
                document.getElementById('content-wrapper').scrollTop = 0;
            }, 200);
        }

        document.addEventListener('DOMContentLoaded', renderMenu);
    </script>
</body>
</html>
