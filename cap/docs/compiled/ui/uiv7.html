<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CAP UI // V7.0 HYBRID</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
    --bg-deep: #050505;
    --red-muted: #661414;
    --red-mid: #8a1a1a;
    --red-bright: #cc2424;
    --cyan-dim: #1a5c66;
    --border-muted: rgba(102, 20, 20, 0.4);
    --metal-shine: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 45%, #333 50%, #1a1a1a 55%, #111 100%);
    --gl: rgba(10, 10, 10, 0.85);
    --trans-timing: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    --t-fast: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

body, html {
    margin: 0; padding: 0; width: 100vw; height: 100vh;
    background-color: var(--bg-deep); color: #999;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    overflow: hidden; touch-action: none; overscroll-behavior: none;
}

.bg-lines {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: linear-gradient(var(--border-muted) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border-muted) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.04; z-index: 0; pointer-events: none;
}

#wrapper {
    position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
    overflow-y: auto; overflow-x: hidden; z-index: 1;
    transition: padding-top 0.5s ease; padding-top: 20px;
}
body.dock-active #wrapper { padding-top: 90px; }

#content {
    padding: 80px 100px; max-width: 1200px; margin: 0 auto;
    background: radial-gradient(circle at top right, #0d0d0d, #050505);
    min-height: 100%; box-sizing: border-box;
    border-left: 1px solid rgba(255,255,255,0.02);
    border-right: 1px solid rgba(255,255,255,0.02);
}

/* DOCK SYSTEM */
#dock {
    position: absolute; top: 15px; left: 20px; width: calc(100vw - 40px); height: 60px;
    display: flex; align-items: center; gap: 15px; overflow-x: auto; overflow-y: hidden;
    z-index: 1000; pointer-events: none; opacity: 0; transition: opacity 0.4s;
    scrollbar-width: none; cursor: grab;
}
#dock::-webkit-scrollbar { display: none; }
#dock.active { opacity: 1; pointer-events: auto; }

.slot { width: 45px; height: 45px; flex-shrink: 0; border: 1px dashed rgba(102, 20, 20, 0.2); border-radius: 4px; position: relative; }

/* CHUNK SYSTEM */
#sidebar {
    position: absolute; top: 0; left: 0; width: 420px; height: 100vh; padding: 20px;
    box-sizing: border-box; overflow-y: auto; overflow-x: visible; pointer-events: none;
    scrollbar-width: none; z-index: 500; perspective: 2000px;
}
#sidebar::-webkit-scrollbar { display: none; }
#chunks-container { width: 100%; pointer-events: auto; }

.chunk {
    margin-bottom: 25px; position: relative; width: 100%;
    transform-style: preserve-3d;
    transition: top var(--trans-timing), left var(--trans-timing), width var(--trans-timing), height var(--trans-timing), transform var(--trans-timing), opacity 0.4s;
}

.chunk.dis { opacity: 0; transform: rotateY(-30deg) translateZ(-200px); }

.c-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }

.t-bg {
    position: absolute; background: var(--metal-shine); border: 1px solid #111;
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.05), inset -1px -1px 0 rgba(0,0,0,0.8), 10px 10px 25px rgba(0,0,0,0.5);
    pointer-events: none; z-index: 0; transition: transform var(--t-fast), height var(--t-fast);
}
.t-bg::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url("https://www.transparenttextures.com/patterns/brushed-alum.png");
    opacity: 0.15; mix-blend-mode: overlay;
}

.p-head { top: 0; left: 0; width: 100%; height: 45px; transform-origin: top; }
.p-body { 
    top: 45px; left: 0; width: 100%; height: calc(100% - 45px); 
    background: var(--gl); transform-origin: top; backdrop-filter: blur(10px);
}
.p-side { top: 0; right: -1px; width: 12px; height: 100%; transform-origin: right; transform: rotateY(90deg); }

.c-content { 
    position: relative; z-index: 2; padding: 15px; transform-origin: top; 
    transition: transform var(--t-fast), opacity var(--t-fast); backface-visibility: hidden; 
}

/* BOLTS */
.bolt {
    position: absolute; width: 5px; height: 5px; background: #222; border-radius: 50%;
    box-shadow: inset 1px 1px 1px rgba(255,255,255,0.1), 1px 1px 2px rgba(0,0,0,0.9); z-index: 5;
}
.t-l { top: 6px; left: 6px; } .t-r { top: 6px; right: 6px; }
.b-l { bottom: 6px; left: 6px; } .b-r { bottom: 6px; right: 6px; }

/* MINIMIZED STATE */
.chunk.min { cursor: pointer; margin: 0!important; }
.chunk.min .p-body, .chunk.min .p-side { opacity: 0; transform: scaleY(0); pointer-events: none; }
.chunk.min .p-head { height: 100%; border: 1px solid var(--red-muted); box-shadow: 0 0 15px rgba(0,0,0,0.5); }
.chunk.min .c-content { opacity: 0; transform: scale(0); pointer-events: none; }

.m-icon {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--red-bright); font-weight: bold;
    transform: rotateX(-90deg); transition: transform var(--t-fast);
    z-index: 10; pointer-events: none; text-shadow: 0 0 10px var(--red-muted);
}
.chunk.min .m-icon { transform: rotateX(0deg); }

/* TYPOGRAPHY & UI */
.brand { font-size: 0.9em; font-weight: bold; color: #fff; letter-spacing: 4px; text-transform: uppercase; }
.ctrl-btn {
    background: transparent; border: 1px solid #444; color: #666; padding: 4px 8px; cursor: pointer;
    font-size: 0.7em; text-transform: uppercase; transition: 0.3s;
}
.ctrl-btn:hover { border-color: var(--red-bright); color: #fff; background: var(--red-muted); }

.tier-1-hdr {
    color: var(--red-bright); font-size: 0.75em; text-transform: uppercase; letter-spacing: 2px;
    font-weight: bold; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
}

.tier-2-wrap { margin-bottom: 6px; }
.tier-2-hdr {
    color: #ccc; font-size: 0.65em; text-transform: uppercase; letter-spacing: 1.5px;
    padding: 10px 12px; background: rgba(0, 0, 0, 0.4); border-left: 2px solid var(--red-muted);
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
}
.tier-2-hdr::after { content: '⚙'; font-size: 1em; color: #444; transition: transform 0.4s; }
.tier-2-wrap.active .tier-2-hdr::after { transform: rotate(180deg); color: var(--red-bright); }

.tier-3-cont { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: rgba(0,0,0,0.5); }
.tier-2-wrap.active .tier-3-cont { max-height: 800px; }

.doc-link {
    display: block; padding: 8px 15px; color: #666; text-decoration: none; cursor: pointer;
    font-size: 0.75em; border-bottom: 1px solid rgba(255,255,255,0.01); transition: 0.2s;
}
.doc-link:hover { color: #aaa; background: rgba(255, 255, 255, 0.03); padding-left: 20px; }
.doc-link.active { color: #fff; background: rgba(138, 26, 26, 0.3); border-right: 3px solid var(--red-bright); }

#content h1 { color: #eee; border-bottom: 2px solid var(--red-muted); padding-bottom: 15px; font-size: 2.2em; }
#content h2 { color: var(--red-mid); font-size: 1.4em; margin-top: 40px; border-bottom: 1px solid #222; }
#content p, #content li { line-height: 1.8; color: #777; }
</style>
</head>
<body>

<div class="bg-lines"></div>
<div id="dock"></div>

<div id="wrapper">
    <div id="content">
        <h1 style="text-align:center; margin-top: 25vh; border:none; color: #1a1a1a; font-size: 5em; letter-spacing: 30px;">V7</h1>
    </div>
</div>

<div id="sidebar">
    <div id="chunks-container"></div>
</div>

<script>
    const docsData = {
        "CORE_SYSTEM": {
            "MANIFEST": {
                "OPERATOR": "# OPERATOR_LOG\n\nSystem initialized in hybrid mode.\n\n* Version: 7.0\n* Status: STABLE",
                "SECURITY": "# SECURITY_PROTO\n\nEncryption layers active."
            },
            "GEARBOX": {
                "TORQUE": "# POWER_CURVE\n\nEfficiency: 98.4%",
                "FLUIDS": "# HYDRAULICS\n\nPressure nominal."
            }
        },
        "NETWORK_GRID": {
            "NODES": {
                "NODE_ALPHA": "# ALPHA_LINK\n\nUptime: 452h",
                "NODE_BETA": "# BETA_LINK\n\nLatency: 4ms"
            }
        }
    };

    const icons = ['◩','◪','◈','⬢','⬣','⎈','⚙','⌬'];
    let state = [];
    let isDragging = false;

    function init() {
        const container = document.getElementById('chunks-container');
        const dock = document.getElementById('dock');

        // Main Title Chunk
        createChunk('c-0', `
            <div class="c-inner">
                <div class="bolt t-l"></div><div class="bolt t-r"></div>
                <div class="t-bg p-head"></div><div class="t-bg p-body"></div><div class="t-bg p-side"></div>
                <div class="m-icon">⌬</div>
                <div class="c-content">
                    <div class="brand">CAP_SYSTEM // V7</div>
                    <div style="display:flex; justify-content:space-between; margin-top:15px; align-items:center;">
                        <span style="color:#444; font-size:0.6em; letter-spacing:2px;">ORCHESTRATOR</span>
                        <button class="ctrl-btn" onclick="event.stopPropagation(); toggleAll()">[ MIN_ALL ]</button>
                    </div>
                </div>
            </div>
        `, true);

        // Data Chunks
        let idx = 1;
        for (const [cat, subcats] of Object.entries(docsData)) {
            let html = `
                <div class="c-inner">
                    <div class="bolt t-l"></div><div class="bolt t-r"></div>
                    <div class="t-bg p-head"></div><div class="t-bg p-body"></div><div class="t-bg p-side"></div>
                    <div class="m-icon">${icons[idx % icons.length]}</div>
                    <div class="c-content">
                        <div class="tier-1-hdr"><span>${cat}</span><button class="ctrl-btn" onclick="event.stopPropagation(); toggle('c-${idx}')">[ _ ]</button></div>
            `;
            
            for (const [sub, files] of Object.entries(subcats)) {
                html += `<div class="tier-2-wrap"><div class="tier-2-hdr" onclick="event.stopPropagation(); this.parentNode.classList.toggle('active')">${sub}</div><div class="tier-3-cont">`;
                for (const [title, content] of Object.entries(files)) {
                    html += `<a class="doc-link" onclick="loadContent(event, \`${content.replace(/\n/g, '\\n')}\`)">${title}</a>`;
                }
                html += `</div></div>`;
            }
            
            html += `</div></div>`;
            createChunk(`c-${idx}`, html);
            idx++;
        }

        // Entrance Animation
        const chunks = document.querySelectorAll('.chunk');
        chunks.forEach((c, i) => {
            setTimeout(() => c.classList.remove('dis'), i * 100);
        });

        initDockDrag();
    }

    function createChunk(id, html, isFixed = false) {
        // Create Slot in Dock
        const slot = document.createElement('div');
        slot.className = 'slot'; slot.id = 's-' + id;
        document.getElementById('dock').appendChild(slot);

        // Create Chunk
        const c = document.createElement('div');
        c.className = 'chunk dis'; c.id = id;
        c.innerHTML = html;
        c.onclick = () => { if(!isDragging && c.classList.contains('min')) toggle(id); };
        document.getElementById('chunks-container').appendChild(c);
        
        state.push({ id, min: false, height: 0 });
    }

    function toggle(id) {
        const c = document.getElementById(id);
        const s = document.getElementById('s-' + id);
        const entry = state.find(x => x.id === id);
        
        if (!entry.min) {
            // Minimize
            entry.height = c.offsetHeight;
            const rect = c.getBoundingClientRect();
            
            // Placeholder to keep scroll height
            const ph = document.createElement('div'); ph.id = 'ph-' + id;
            ph.style.height = rect.height + 'px'; ph.style.marginBottom = '25px';
            ph.style.transition = '0.4s';
            c.parentNode.insertBefore(ph, c);

            document.body.appendChild(c);
            c.style.position = 'fixed'; c.style.top = rect.top + 'px'; c.style.left = rect.left + 'px';
            c.style.width = rect.width + 'px'; c.style.height = rect.height + 'px'; c.style.zIndex = '10000';
            void c.offsetWidth;

            c.classList.add('min');
            const target = s.getBoundingClientRect();
            c.style.top = target.top + 'px'; c.style.left = target.left + 'px';
            c.style.width = target.width + 'px'; c.style.height = target.height + 'px';

            setTimeout(() => {
                if(entry.min) {
                    c.style.transition = 'none'; s.appendChild(c);
                    c.style.position = 'absolute'; c.style.top = '0'; c.style.left = '0';
                    c.style.width = '100%'; c.style.height = '100%';
                    void c.offsetWidth;
                    c.style.transition = '';
                }
            }, 600);
            
            requestAnimationFrame(() => { ph.style.height = '0'; ph.style.marginBottom = '0'; });
            entry.min = true;
        } else {
            // Restore
            const ph = document.getElementById('ph-' + id);
            const rect = c.getBoundingClientRect();
            document.body.appendChild(c);
            c.style.position = 'fixed'; c.style.top = rect.top + 'px'; c.style.left = rect.left + 'px';
            c.style.width = rect.width + 'px'; c.style.height = rect.height + 'px';
            void c.offsetWidth;

            c.classList.remove('min');
            const target = ph ? ph.getBoundingClientRect() : { top: 100, left: 20, width: 380, height: entry.height };
            c.style.top = target.top + 'px'; c.style.left = target.left + 'px';
            c.style.width = target.width + 'px'; c.style.height = target.height + 'px';

            if(ph) ph.style.height = entry.height + 'px'; ph.style.marginBottom = '25px';

            setTimeout(() => {
                if(!entry.min) {
                    c.style.transition = 'none';
                    if(ph) { ph.parentNode.insertBefore(c, ph); ph.remove(); }
                    else { document.getElementById('chunks-container').appendChild(c); }
                    c.style.position = 'relative'; c.style.top = ''; c.style.left = '';
                    c.style.width = '100%'; c.style.height = 'auto';
                    void c.offsetWidth;
                    c.style.transition = '';
                }
            }, 600);
            entry.min = false;
        }
        updateDockState();
    }

    function toggleAll() {
        const allMin = !state.find(x => x.id === 'c-0').min;
        state.forEach((s, i) => {
            setTimeout(() => {
                if(allMin && !s.min) toggle(s.id);
                else if(!allMin && s.min) toggle(s.id);
            }, i * 60);
        });
    }

    function updateDockState() {
        const anyMin = state.some(x => x.min);
        const dock = document.getElementById('dock');
        if(anyMin) { dock.classList.add('active'); document.body.classList.add('dock-active'); }
        else { dock.classList.remove('active'); document.body.classList.remove('dock-active'); }
    }

    function loadContent(event, markdown) {
        event.preventDefault(); event.stopPropagation();
        document.querySelectorAll('.doc-link').forEach(l => l.classList.remove('active'));
        event.target.classList.add('active');
        const content = document.getElementById('content');
        content.style.opacity = 0;
        setTimeout(() => {
            content.innerHTML = marked.parse(markdown);
            content.style.opacity = 1;
            document.getElementById('wrapper').scrollTop = 0;
        }, 200);
    }

    function initDockDrag() {
        const dock = document.getElementById('dock');
        let startX, scrollLeft;
        dock.onmousedown = (e) => { isDragging = true; startX = e.pageX - dock.offsetLeft; scrollLeft = dock.scrollLeft; };
        window.onmouseup = () => { isDragging = false; };
        dock.onmousemove = (e) => {
            if(!isDragging) return;
            const x = e.pageX - dock.offsetLeft;
            const walk = (x - startX) * 2;
            dock.scrollLeft = scrollLeft - walk;
        };
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
